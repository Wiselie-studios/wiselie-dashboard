<html lang="en">

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #090909;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(245,245,245,0.07);
    --text: #F5F5F5;
    --text-dim: rgba(245,245,245,0.32);
    --text-mid: rgba(245,245,245,0.58);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist', sans-serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.5;
  }

  .layout {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 36px 56px 28px;
    gap: 0;
  }

  /* ── TOP BAR ── */
  .top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 32px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }

  .logo-wrap img {
    height: 28px;
    width: auto;
    display: block;
    opacity: 0.92;
  }

  /* ── FLIP CLOCK ── */
  .clock-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .flip-clock {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  /* Each digit card */
  .digit {
    width: 52px;
    height: 72px;
    position: relative;
    perspective: 400px;
    font-family: 'DM Mono', monospace;
    font-size: 46px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.02em;
    margin: 0;
  }

  /* static card face (always visible) */
  .digit-face {
    position: absolute;
    inset: 0;
    background: var(--surface);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  /* fold line */
  .digit-face::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    top: 50%;
    height: 1px;
    background: rgba(0,0,0,0.55);
    z-index: 2;
  }

  /* top half darker */
  .digit-face::before {
    content: '';
    position: absolute;
    inset: 0 0 50% 0;
    background: rgba(0,0,0,0.15);
    pointer-events: none;
    z-index: 1;
  }

  /* the flip panel — top half flips down */
  .digit-flap {
    position: absolute;
    left: 0; right: 0; top: 0;
    height: 50%;
    transform-origin: bottom center;
    transform-style: preserve-3d;
    z-index: 10;
    border-radius: 6px 6px 0 0;
    overflow: hidden;
  }

  .digit-flap {
    opacity: 0;
  }

  .digit-flap.animate {
    opacity: 1;
    animation: flipDown 0.35s ease-in-out forwards;
  }

  @keyframes flipDown {
    0%   { transform: rotateX(0deg); opacity: 1; }
    100% { transform: rotateX(-90deg); opacity: 0; }
  }

  /* flap face (shows old top digit during flip) */
  .digit-flap-face {
    position: absolute;
    inset: 0;
    background: var(--surface2);
    border: 1px solid rgba(255,255,255,0.12);
    border-bottom: none;
    border-radius: 6px 6px 0 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    padding-bottom: -36px;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.2);
  }

  .digit-flap-face span {
    position: absolute;
    bottom: -36px;
    font-family: 'DM Mono', monospace;
    font-size: 46px;
    font-weight: 500;
    color: var(--text);
    transform: translateY(-50%);
  }

  .colon {
    font-family: 'DM Mono', monospace;
    font-size: 40px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1;
    margin: 0 12px;
    animation: colonBlink 1s step-end infinite;
    align-self: center;
    margin-bottom: 4px;
  }

  @keyframes colonBlink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  .clock-date {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  /* ── DAY INFO ── */
  .day-info {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
  }

  .day-name {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--text-mid);
    text-transform: uppercase;
  }

  .day-mode {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.28em;
    color: var(--text-dim);
    text-transform: uppercase;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 2px;
  }

  /* ── LINKS ── */
  .links-section {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 14px;
    padding: 28px 0;
  }

  .links-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
  }

  .links-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .category-group {
    margin-bottom: 20px;
  }

  .category-group:last-child {
    margin-bottom: 0;
  }

  .category-header {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--text-mid);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 11px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    text-decoration: none;
    color: var(--text-mid);
    font-family: 'Geist', sans-serif;
    font-size: 12.5px;
    font-weight: 400;
    letter-spacing: 0.01em;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
  }

  .link-card:hover {
    background: var(--surface2);
    border-color: rgba(245,245,245,0.14);
    color: var(--text);
    transform: translateY(-1px);
  }

  .link-icon {
    width: 14px; height: 14px;
    opacity: 0.45;
    flex-shrink: 0;
    transition: opacity 0.12s;
  }
  .link-card:hover .link-icon { opacity: 0.8; }

  /* ── BOTTOM BAR ── */
  .bottom-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  .bottom-phrase {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.3em;
    color: var(--text-dim);
    font-style: italic;
    text-transform: uppercase;
  }

  .day-dots {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .day-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(245,245,245,0.1);
  }
  .day-dot.active { background: var(--text); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .layout { animation: fadeUp 0.45s ease both; }
</style>

// ── FLIP CLOCK ────────────────────────────────────────────────────────────────
// Bulletproof approach: each digit is a container with a visible number.
// On change, we animate a "flap" that covers the top half and folds away.

const digitIds = ['h1','h2','m1','m2','s1','s2'];
const digitEls = {}; // stores { face, flap, flapSpan }
let prevVals = {};

function pad(n) { return String(n).padStart(2,'0'); }

function buildClock() {
  const clock = document.getElementById('flip-clock');
  clock.innerHTML = '';

  digitIds.forEach((id, i) => {
    // Add colon separators
    if (i === 2 || i === 4) {
      const col = document.createElement('div');
      col.className = 'colon';
      col.textContent = ':';
      clock.appendChild(col);
    }

    const wrap = document.createElement('div');
    wrap.className = 'digit';
    wrap.id = 'digit-' + id;

    // Static face (shows current number always)
    const face = document.createElement('div');
    face.className = 'digit-face';
    const faceSpan = document.createElement('span');
    faceSpan.style.cssText = 'font-family:"DM Mono",monospace;font-size:46px;font-weight:500;line-height:1;';
    faceSpan.textContent = '0';
    face.appendChild(faceSpan);

    // Flap (animated top half, shows OLD number during flip)
    const flap = document.createElement('div');
    flap.className = 'digit-flap';
    const flapFace = document.createElement('div');
    flapFace.className = 'digit-flap-face';
    const flapSpan = document.createElement('span');
    flapSpan.style.cssText = 'font-family:"DM Mono",monospace;font-size:46px;font-weight:500;line-height:1;';
    flapSpan.textContent = '0';
    flapFace.appendChild(flapSpan);
    flap.appendChild(flapFace);

    wrap.appendChild(face);
    wrap.appendChild(flap);
    clock.appendChild(wrap);

    digitEls[id] = { faceSpan, flap, flapSpan };
    prevVals[id] = '';
  });
}

function flipDigit(id, newVal) {
  const el = digitEls[id];
  if (!el) return;

  const oldVal = prevVals[id];

  // Show old value on flap, new value on face
  el.flapSpan.textContent = oldVal;
  el.faceSpan.textContent = newVal;

  // Animate the flap folding down
  el.flap.classList.remove('animate');
  void el.flap.offsetWidth; // reflow
  el.flap.classList.add('animate');

  prevVals[id] = newVal;
}

function setDigit(id, val) {
  const el = digitEls[id];
  if (!el) return;
  el.faceSpan.textContent = val;
  el.flapSpan.textContent = val;
  prevVals[id] = val;
}

function tickClock() {
  const now = new Date();
  let h = now.getHours();
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  const m = now.getMinutes();
  const s = now.getSeconds();

  const hS = pad(h), mS = pad(m), sS = pad(s);
  const vals = { h1: hS[0], h2: hS[1], m1: mS[0], m2: mS[1], s1: sS[0], s2: sS[1] };

  digitIds.forEach(id => {
    if (prevVals[id] !== vals[id]) {
      flipDigit(id, vals[id]);
    }
  });

  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent =
    `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} · ${ampm}`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init() {
  buildClock();

  const now = new Date();
  const dow = now.getDay();
  const cfg = DAYS[dow];

  // Set initial digits without animation
  let h = now.getHours() % 12 || 12;
  const hS = pad(h), mS = pad(now.getMinutes()), sS = pad(now.getSeconds());
  setDigit('h1', hS[0]); setDigit('h2', hS[1]);
  setDigit('m1', mS[0]); setDigit('m2', mS[1]);
  setDigit('s1', sS[0]); setDigit('s2', sS[1]);

  const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('clock-date').textContent =
    `${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()} · ${ampm}`;

  // Day info
  document.getElementById('day-name').textContent = cfg.name;
  document.getElementById('day-mode').textContent = cfg.mode.toUpperCase();
  document.getElementById('links-label').textContent = cfg.label;
  document.getElementById('daily-phrase').textContent = cfg.phrase;

  // Links
  const grid = document.getElementById('links-grid');
  const categoryOrder = ['Google Workspace', 'Studios Tech Stack', 'Dev Tools', 'Finance', 'Social Links'];
  categoryOrder.forEach(category => {
    const links = cfg.links[category];
    if (!links || links.length === 0) return;
    
    const categoryGroup = document.createElement('div');
    categoryGroup.className = 'category-group';
    
    const categoryHeader = document.createElement('div');
    categoryHeader.className = 'category-header';
    categoryHeader.textContent = category;
    categoryGroup.appendChild(categoryHeader);
    
    const linksGrid = document.createElement('div');
    linksGrid.className = 'links-grid';
    
    links.forEach(link => {
      const a = document.createElement('a');
      a.className = 'link-card';
      a.href = link.href;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.innerHTML = (ICONS[link.icon] || '') + link.label;
      linksGrid.appendChild(a);
    });
    
    categoryGroup.appendChild(linksGrid);
    grid.appendChild(categoryGroup);
  });

  // Day dots
  const dotsEl = document.getElementById('day-dots');
  ['S','M','T','W','T','F','S'].forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'day-dot' + (i === dow ? ' active' : '');
    dotsEl.appendChild(d);
  });

  setInterval(tickClock, 1000);
}

document.addEventListener('DOMContentLoaded', init);
